conky.config = {
    alignment = 'middle_middle',
    gap_x = -2560,
    background = false,
    double_buffer = true,
    update_interval = 1,

    -- Transparent window
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,      -- legacy flag (kept for older versions)
    own_window_argb_visual = true,     -- enable ARGB visual
    own_window_argb_value = 0,         -- 0 % opacity → fully transparent background
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Size (just a safety net; the window will shrink to fit the text)
    minimum_width = 400,
    minimum_height = 200,
    border_width = 0,

    -- Text rendering
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,
    use_xft = true,
    font = 'DejaVu Sans Mono:size=96',
    xftalpha = 0.8,
    default_color = 'dark red',          -- white text (you can change the hex colour)

    net_avg_samples = 2,
    cpu_avg_samples = 2,
    override_utf8_locale = true,
};

conky.text = [[
${alignc}${time %H:%M:%S}
${alignc}${voffset -95}${color #c52233}${font DejaVu Sans Mono:size=26}${time %A, %B %d, %Y}
]];
