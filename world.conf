-----------------------------------------------------------------
--  Conky – ultra‑slim left sidebar showing several time‑zones --
-----------------------------------------------------------------
conky.config = {
    -- ── Position & size ───────────────────────────────────────
    alignment   = 'top_left',   -- stick to the top‑left corner
    gap_x       = 10,           -- distance from the left screen edge
    gap_y       = 30,           -- distance from the top (leave room for panels)
    minimum_width  = 110,       -- slim width
    minimum_height = 0,         -- height grows with the content
    border_margin  = 0,

    -- ── Window behaviour ─────────────────────────────────────
    own_window          = true,
    own_window_type     = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value  = 0,          -- fully transparent background
    own_window_hints   = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- ── Refresh & misc ───────────────────────────────────────
    background      = false,
    double_buffer   = true,
    update_interval = 1,

    -- ── Text rendering ───────────────────────────────────────
    use_xft   = true,
    font      = 'DejaVu Sans Mono:size=20',   -- base font for everything
    xftalpha  = 0.9,
    default_color = 'dark red',                -- white text (change if you like)

    net_avg_samples = 2,
    cpu_avg_samples = 2,
    override_utf8_locale = true,
};

conky.text = [[
${alignc}${font DejaVu Sans Mono:size=12}World Clock${font}
${hr 2}
# ── NEW YORK ───────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}New York${font}
${alignc}${tztime America/New_York}
${voffset 8}
${hr 2}
# ── LONDON ─────────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}London${font}
${alignc}${tztime Europe/London}
${voffset 8}
${hr 2}
# ── BERLIN ─────────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}Seattle${font}
${alignc}${tztime America/Los_Angeles}
${voffset 8}
${hr 2}
# ── TOKYO ───────────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}Tokyo${font}
${alignc}${tztime Asia/Tokyo}
${voffset 8}
${hr 2}

# ── SYDNEY ──────────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}Sydney${font}
${alignc}${tztime Australia/Sydney}
${voffset 8}
${hr 2}
# ── UTC ───────────────────────────────────────────────
${alignc}${font DejaVu Sans Mono:size=10}Stockholm${font}
${alignc}${tztime Europe/Stockholm}
${voffset 8}
${hr 2}
${alignc}${font DejaVu Sans Mono:size=10}Colorado${font}
${alignc}${tztime America/Denver}
${voffset 8}
${hr}

]]
